bundle:
  name: intelligent-darts

sync:
  include:
    - .build

artifacts:
  default:
    build: uv run apx build

resources:
  apps:
    intelligent-darts-app:
      name: "intelligent-darts"
      description: "intelligent-darts created with apx"
      source_code_path: ./.build
      config:
        env:
          - name: "INTELLIGENT_DARTS_LAKEBASE_PROJECT"
            value: "intelligent-darts"
          - name: "INTELLIGENT_DARTS_LAKEBASE_HOST"
            value: "ep-flat-haze-d16jh93f.database.us-west-2.cloud.databricks.com"
      resources:
        - name: "serving-endpoint"
          description: "Dart pose detection model serving endpoint"
          serving_endpoint:
            name: "dart_pose_detector"
            permission: "CAN_QUERY"

targets:
  dev:
    mode: development
    default: true